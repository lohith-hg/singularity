name: singularity
version: 2.0.0+10
publish_to: none
description: A new Flutter project.
environment: 
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  share_plus: ^13.1.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  # BLoC state management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  # Dependency injection
  get_it: ^9.2.1
  # Routing
  go_router: ^17.2.3
  # State equality
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  # HTTP client (ISS tracker, image downloads)
  http: ^1.2.2
  # Image caching
  cached_network_image: ^3.4.1
  # Save images to device gallery
  gal: ^2.2.0
  # Onboarding seen flag
  shared_preferences: ^2.3.3
  # World map for ISS tracker
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  # Lottie animations
  lottie: ^3.3.1
  # Date/number formatting
  intl: ^0.20.2
  # Open external URLs
  url_launcher: ^6.3.1
  # Local cache storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Shimmer loading skeletons
  shimmer: ^3.0.0
  # In-app YouTube playback for video APODs
  youtube_player_iframe: ^5.2.0
  # In-app video playback fallback for non-YouTube (e.g. Vimeo) embeds
  webview_flutter: ^4.13.0
  # Platform packages — needed for inline media playback / autoplay config
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: '#000000'
  image: assets/app_icon.png

flutter:
  assets:
    - assets/
  uses-material-design: true
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Light.ttf
          weight: 300
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
